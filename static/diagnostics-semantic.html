<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Semantic Diagnostics — Fast Code Search</title>
    <link rel="stylesheet" href="/tailwind.css"/>
    <link rel="stylesheet" href="/fonts.css"/>
    <link rel="stylesheet" href="/material-symbols.css"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-family: 'Material Symbols Outlined'; font-style: normal; line-height: 1;
            letter-spacing: normal; text-transform: none; display: inline-block;
            white-space: nowrap; overflow-wrap: normal; direction: ltr;
            -webkit-font-smoothing: antialiased; vertical-align: middle;
        }
        body {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%237a785f' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
        }
        :root {
            --bg-primary: #fefae4; --bg-secondary: #f2eed9; --bg-tertiary: #ece9d4;
            --text-primary: #1d1c0f; --text-secondary: #494831; --text-muted: #7a785f;
            --accent: #646100; --accent-hover: #4b4900; --success: #1e6868; --warning: #6a6707;
            --error: #ba1a1a; --border: #cbc8aa; --code-bg: #f8f4df; --code-text: #1d1c0f;
            --color-path: #646100; --color-deps: #1e6868;
            --shadow: rgba(29,28,15,0.08); --shadow-lg: rgba(29,28,15,0.16);
        }
        .card { border-radius: 0 !important; box-shadow: 2px 2px 0 rgba(0,0,0,0.12); }
        .stat-item { border-radius: 0 !important; }
        .test-results { border-radius: 0 !important; }
        .sample-files { border-radius: 0 !important; }
        .test-details { border-radius: 0 !important; }
        .status-banner { border-radius: 0 !important; }
        .model-info { border-radius: 0 !important; }
        .chunk-item { border-radius: 0 !important; }
        .card h3 { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; }
        .semantic-badge { background: #a9efed; border: 1px solid #1e6868; padding: 0.15rem 0.5rem; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: #004f4e; border-radius: 0 !important; }
        .refresh-btn {
            background: #fff900 !important; color: #000 !important;
            border: 1px solid #000 !important; border-radius: 0 !important;
            padding: 0.5rem 1rem; cursor: pointer; font-size: 0.78rem;
            font-family: 'JetBrains Mono', monospace; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em;
            display: flex; align-items: center; gap: 0.5rem; margin-left: auto;
            transition: background 0.1s, color 0.1s;
        }
        .refresh-btn:hover { background: #000 !important; color: #fff900 !important; }
        .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .refresh-btn.loading::after {
            content: ''; width: 14px; height: 14px;
            border: 2px solid transparent; border-top-color: currentColor;
            border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block;
        }
        .diagnostics-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        .diagnostics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .diagnostics-header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .back-link:hover {
            color: var(--accent-hover);
        }

        .status-banner {
            padding: 1rem 1.5rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .status-banner.healthy {
            background: color-mix(in srgb, var(--success) 10%, transparent);
            border: 1px solid var(--success);
        }

        .status-banner.degraded {
            background: color-mix(in srgb, var(--warning) 10%, transparent);
            border: 1px solid var(--warning);
        }

        .status-banner.unhealthy {
            background: color-mix(in srgb, var(--error) 10%, transparent);
            border: 1px solid var(--error);
        }

        .status-icon {
            font-size: 2rem;
        }

        .status-text h2 {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }

        .status-text p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .refresh-btn {
            margin-left: auto;
            padding: 0.5rem 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.875rem;
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .refresh-btn:hover {
            background: var(--accent-hover);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .refresh-btn.loading::after {
            content: '';
            width: 14px;
            height: 14px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1rem;
        }

        .card h3 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .stat-item {
            background: var(--bg-primary);
            padding: 0.75rem;
            border-radius: 4px;
        }

        .stat-item .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
        }

        .stat-item .label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .model-info {
            background: var(--bg-primary);
            border-radius: 4px;
            padding: 1rem;
        }

        .model-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
        }

        .model-row:last-child {
            border-bottom: none;
        }

        .model-label {
            color: var(--text-secondary);
        }

        .model-value {
            color: var(--text-primary);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        .model-value.success {
            color: var(--success);
        }

        .model-value.error {
            color: var(--error);
        }

        .chunk-breakdown {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
        }

        .chunk-item {
            background: var(--bg-primary);
            padding: 0.75rem;
            border-radius: 4px;
            text-align: center;
        }

        .chunk-item .value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
        }

        .chunk-item .label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .test-results {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .test-results-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .test-results-header h3 {
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .test-summary {
            display: flex;
            gap: 1rem;
            font-size: 0.875rem;
        }

        .test-summary .passed {
            color: var(--success);
        }

        .test-summary .failed {
            color: var(--error);
        }

        .test-list {
            list-style: none;
        }

        .test-item {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .test-item:last-child {
            border-bottom: none;
        }

        .test-icon {
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .test-icon.pass {
            color: var(--success);
        }

        .test-icon.fail {
            color: var(--error);
        }

        .test-content {
            flex: 1;
        }

        .test-name {
            font-weight: 500;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        .test-message {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .test-details {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: var(--bg-primary);
            padding: 0.5rem;
            border-radius: 4px;
        }

        .test-duration {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .sample-files {
            background: var(--bg-primary);
            border-radius: 4px;
            padding: 0.5rem;
            max-height: 150px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
        }

        .sample-file {
            padding: 0.25rem 0;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .loading-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .error-state {
            text-align: center;
            padding: 3rem;
            color: var(--error);
        }

        .semantic-badge {
            background: linear-gradient(135deg, #89b4fa, #cba6f7);
            color: var(--bg-primary);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 0.5rem;
        }
    </style>
</head>

<body class="bg-background text-on-background font-body min-h-screen pb-16 md:pb-0">

    <header class="bg-white font-label uppercase tracking-tighter text-sm flex justify-between items-center w-full px-6 h-14 sticky top-0 z-50 border-b border-black">
        <div class="flex items-center gap-6">
            <div class="text-base font-bold font-label text-black bg-primary-container px-2 py-0.5 border border-black">FAST_CODE_SEARCH</div>
            <nav class="hidden md:flex items-center gap-0 h-14">
                <a class="h-full flex items-center px-3 text-outline hover:bg-primary-container hover:text-black hover:border-b-2 hover:border-black transition-colors duration-75" href="/">SEARCH</a>
                <a class="h-full flex items-center px-3 bg-primary-container border-b-2 border-black text-black font-bold transition-colors duration-75" href="/semantic.html">SEMANTIC</a>
                <a class="h-full flex items-center px-3 text-outline hover:bg-primary-container hover:text-black hover:border-b-2 hover:border-black transition-colors duration-75" href="/diagnostics.html">INDEX</a>
                <a class="h-full flex items-center px-3 text-outline hover:bg-primary-container hover:text-black hover:border-b-2 hover:border-black transition-colors duration-75" href="/docs.html">DOCS</a>
            </nav>
        </div>
        <a href="/docs.html" class="material-symbols-outlined text-outline hover:text-black transition-colors" style="font-size:20px" title="Documentation">help_outline</a>
    </header>

    <main class="max-w-[1440px] mx-auto p-6">
        <div id="content">
            <div style="text-align:center;padding:3rem;font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:#7a785f;">
                Loading diagnostics...
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-14 bg-white font-label text-[10px] uppercase border-t border-black">
        <a class="flex flex-col items-center justify-center text-outline px-4 py-1 hover:bg-primary-container hover:text-black transition-all" href="/"><span class="material-symbols-outlined" style="font-size:20px">search</span><span>Search</span></a>
        <a class="flex flex-col items-center justify-center bg-primary-container text-black px-4 py-1" href="/semantic.html"><span class="material-symbols-outlined" style="font-size:20px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">auto_awesome</span><span>Semantic</span></a>
        <a class="flex flex-col items-center justify-center text-outline px-4 py-1 hover:bg-primary-container hover:text-black transition-all" href="/diagnostics.html"><span class="material-symbols-outlined" style="font-size:20px">analytics</span><span>Index</span></a>
        <a class="flex flex-col items-center justify-center text-outline px-4 py-1 hover:bg-primary-container hover:text-black transition-all" href="/docs.html"><span class="material-symbols-outlined" style="font-size:20px">description</span><span>Docs</span></a>
    </nav>

    <script>
        let isLoading = false;

        async function loadDiagnostics(forceRefresh = false) {
            if (isLoading) return;
            isLoading = true;

            const content = document.getElementById('content');
            const refreshBtn = document.getElementById('refresh-btn');

            if (refreshBtn) {
                refreshBtn.disabled = true;
                refreshBtn.classList.add('loading');
            }

            try {
                const url = `/api/diagnostics?force_refresh=${forceRefresh}&sample_count=10`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }

                const data = await response.json();
                renderDiagnostics(data);
            } catch (error) {
                content.innerHTML = `
                    <div class="error-state">
                        <h2>Failed to load diagnostics</h2>
                        <p>${error.message}</p>
                        <button class="refresh-btn" onclick="loadDiagnostics(true)">🔄 Retry</button>
                    </div>
                `;
            } finally {
                isLoading = false;
                if (refreshBtn) {
                    refreshBtn.disabled = false;
                    refreshBtn.classList.remove('loading');
                }
            }
        }

        function renderDiagnostics(data) {
            const statusIcon = data.status === 'healthy' ? '✅' :
                data.status === 'degraded' ? '⚠️' : '❌';
            const statusText = data.status === 'healthy' ? 'All Systems Operational' :
                data.status === 'degraded' ? 'Degraded Performance' : 'System Unhealthy';

            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="status-banner ${data.status}">
                    <span class="status-icon">${statusIcon}</span>
                    <div class="status-text">
                        <h2>${statusText}</h2>
                        <p>Version ${data.version} • Uptime: ${data.uptime_human}</p>
                    </div>
                    <button id="refresh-btn" class="refresh-btn" onclick="loadDiagnostics(true)">
                        🔄 Refresh
                    </button>
                </div>

                <div class="cards-grid">
                    <div class="card">
                        <h3>📊 Semantic Index Statistics</h3>
                        <div class="stat-grid">
                            <div class="stat-item">
                                <div class="value">${data.index.num_files.toLocaleString()}</div>
                                <div class="label">Files Indexed</div>
                            </div>
                            <div class="stat-item">
                                <div class="value">${data.index.num_chunks.toLocaleString()}</div>
                                <div class="label">Code Chunks</div>
                            </div>
                            <div class="stat-item">
                                <div class="value">${data.index.embedding_dim}</div>
                                <div class="label">Embedding Dim</div>
                            </div>
                            <div class="stat-item">
                                <div class="value">${data.index.cache_size.toLocaleString()}</div>
                                <div class="label">Cached Queries</div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h3>🤖 Embedding Model</h3>
                        <div class="model-info">
                            <div class="model-row">
                                <span class="model-label">Model Name</span>
                                <span class="model-value">${escapeHtml(data.model.name)}</span>
                            </div>
                            <div class="model-row">
                                <span class="model-label">Model Type</span>
                                <span class="model-value">${escapeHtml(data.model.model_type)}</span>
                            </div>
                            <div class="model-row">
                                <span class="model-label">Status</span>
                                <span class="model-value ${data.model.loaded ? 'success' : 'error'}">
                                    ${data.model.loaded ? '✓ Loaded' : '✗ Not Loaded'}
                                </span>
                            </div>
                            <div class="model-row">
                                <span class="model-label">Embedding Dimension</span>
                                <span class="model-value">${data.model.embedding_dim}</span>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h3>🧩 Chunks by Type</h3>
                        <div class="chunk-breakdown">
                            <div class="chunk-item">
                                <div class="value">${data.index.chunks_by_type.functions}</div>
                                <div class="label">Functions</div>
                            </div>
                            <div class="chunk-item">
                                <div class="value">${data.index.chunks_by_type.classes}</div>
                                <div class="label">Classes</div>
                            </div>
                            <div class="chunk-item">
                                <div class="value">${data.index.chunks_by_type.modules}</div>
                                <div class="label">Modules</div>
                            </div>
                            <div class="chunk-item">
                                <div class="value">${data.index.chunks_by_type.fixed}</div>
                                <div class="label">Fixed Chunks</div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h3>📂 Sample Indexed Files</h3>
                        <div class="sample-files">
                            ${data.index.sample_files.length > 0 ?
                    data.index.sample_files.map(f => `
                                    <div class="sample-file">${escapeHtml(f)}</div>
                                `).join('') :
                    '<div class="sample-file">No files indexed yet</div>'
                }
                        </div>
                    </div>
                </div>

                <div class="test-results">
                    <div class="test-results-header">
                        <h3>🧪 Self-Test Results</h3>
                        <div class="test-summary">
                            <span class="passed">✓ ${data.test_summary.passed} passed</span>
                            <span class="failed">${data.test_summary.failed > 0 ? '✗ ' + data.test_summary.failed + ' failed' : ''}</span>
                            <span>• ${data.test_summary.total_duration_ms.toFixed(1)}ms total</span>
                        </div>
                    </div>
                    <ul class="test-list">
                        ${data.self_tests.map(test => `
                            <li class="test-item">
                                <span class="test-icon ${test.passed ? 'pass' : 'fail'}">
                                    ${test.passed ? '✓' : '✗'}
                                </span>
                                <div class="test-content">
                                    <div class="test-name">${escapeHtml(test.name)}</div>
                                    <div class="test-message">${escapeHtml(test.message)}</div>
                                    ${test.details ? `<div class="test-details">${escapeHtml(test.details)}</div>` : ''}
                                </div>
                                <span class="test-duration">${test.duration_ms.toFixed(1)}ms</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>

                <div class="meta-info">
                    <span>Generated: ${data.generated_at}</span>
                    <span>Server Type: Semantic Search (Vector Embeddings)</span>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load on page load
        loadDiagnostics();

        // Auto-refresh every 60 seconds
        setInterval(() => loadDiagnostics(false), 60000);
    </script>
</body>

</html>
